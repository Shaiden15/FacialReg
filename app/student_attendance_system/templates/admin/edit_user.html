{% extends "admin/base.html" %}

{% block title %}Edit User - Admin{% endblock %}

{% block content %}
<div class="container-fluid">
  <div class="d-sm-flex align-items-center justify-content-between mb-4">
    <h1 class="h3 mb-0 text-gray-800">Edit User</h1>
    <a href="{{ url_for('admin.list_users') }}" class="d-none d-sm-inline-block btn btn-sm btn-secondary shadow-sm">
      <i class="fas fa-arrow-left fa-sm text-white-50"></i> Back to Users
    </a>
  </div>

  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card shadow mb-4">
        <div class="card-header py-3">
          <h6 class="m-0 font-weight-bold text-primary">User Details</h6>
        </div>
        <div class="card-body">
          <form method="post" action="{{ url_for('admin.edit_user', user_id=user.id) }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group row">
              <label class="col-sm-3 col-form-label">Username</label>
              <div class="col-sm-9">
                <input type="text" class="form-control" value="{{ user.username }}" disabled>
                <small class="form-text text-muted">Username cannot be changed</small>
              </div>
            </div>
            
            <div class="form-group row">
              <label for="email" class="col-sm-3 col-form-label">Email</label>
              <div class="col-sm-9">
                <input type="email" class="form-control" id="email" name="email" value="{{ user.email }}" required>
              </div>
            </div>

            <div class="form-group row">
              <label for="first_name" class="col-sm-3 col-form-label">First Name</label>
              <div class="col-sm-9">
                <input type="text" class="form-control" id="first_name" name="first_name" value="{{ user.first_name or '' }}">
              </div>
            </div>

            <div class="form-group row">
              <label for="last_name" class="col-sm-3 col-form-label">Last Name</label>
              <div class="col-sm-9">
                <input type="text" class="form-control" id="last_name" name="last_name" value="{{ user.last_name or '' }}">
              </div>
            </div>

            <div class="form-group row">
              <label for="role" class="col-sm-3 col-form-label">Role</label>
              <div class="col-sm-9">
                <select class="form-control" id="role" name="role" required>
                  <option value="student" {% if user.role == 'student' %}selected{% endif %}>Student</option>
                  <option value="lecturer" {% if user.role == 'lecturer' %}selected{% endif %}>Lecturer</option>
                  <option value="admin" {% if user.role == 'admin' %}selected{% endif %}>Admin</option>
                </select>
              </div>
            </div>

            <div class="form-group row">
              <label for="password" class="col-sm-3 col-form-label">New Password</label>
              <div class="col-sm-9">
                <input type="password" class="form-control" id="password" name="password" placeholder="Leave blank to keep current password">
                <small class="form-text text-muted">Leave blank to keep current password</small>
              </div>
            </div>

            <div class="form-group row">
              <div class="col-sm-9 offset-sm-3">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="is_active" name="is_active" {% if user.is_active %}checked{% endif %}>
                  <label class="form-check-label" for="is_active">
                    Active Account
                  </label>
                </div>
              </div>
            </div>

            <div class="form-group row mt-4">
              <div class="col-sm-9 offset-sm-3">
                <button type="submit" class="btn btn-primary">
                  <i class="fas fa-save"></i> Save Changes
                </button>
                <a href="{{ url_for('admin.list_users') }}" class="btn btn-secondary">
                  <i class="fas fa-times"></i> Cancel
                </a>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
