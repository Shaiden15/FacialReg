{% extends "base.html" %}

{% block title %}Edit Module - Admin{% endblock %}

{% block content %}
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow-sm">
        <div class="card-header bg-white">
          <h5 class="mb-0">Edit Module: {{ module.name }}</h5>
        </div>
        <div class="card-body">
          <form method="post">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <div class="mb-3">
              <label class="form-label">Module Code</label>
              <input type="text" name="code" class="form-control" required 
                     value="{{ module.code }}" pattern="[A-Za-z0-9]+" 
                     title="Module code should only contain letters and numbers">
              <div class="form-text">Enter a unique module code (letters and numbers only)</div>
            </div>
            
            <div class="mb-3">
              <label class="form-label">Module Name</label>
              <input type="text" name="name" class="form-control" required 
                     value="{{ module.name }}">
            </div>
            
            <div class="mb-4">
              <label class="form-label">Lecturer</label>
              <select name="lecturer_id" class="form-select" required>
                <option value="" disabled>Select a lecturer</option>
                {% for lecturer in lecturers %}
                <option value="{{ lecturer.id }}" 
                        {% if module.lecturer_id == lecturer.id %}selected{% endif %}>
                  {{ lecturer.first_name }} {{ lecturer.last_name }} ({{ lecturer.email }})
                </option>
                {% endfor %}
              </select>
            </div>
            
            <div class="d-flex justify-content-between">
              <a href="{{ url_for('admin.list_modules') }}" class="btn btn-outline-secondary">
                <i class="fas fa-arrow-left me-1"></i> Cancel
              </a>
              <div>
                <a href="{{ url_for('admin.delete_module', module_id=module.id) }}" 
                   class="btn btn-danger me-2"
                   onclick="return confirm('Are you sure you want to delete this module? This action cannot be undone.');">
                  <i class="fas fa-trash me-1"></i> Delete
                </a>
                <button type="submit" class="btn btn-primary">
                  <i class="fas fa-save me-1"></i> Save Changes
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
// Client-side validation for module code
const codeInput = document.querySelector('input[name="code"]');
if (codeInput) {
  codeInput.addEventListener('input', function(e) {
    this.value = this.value.toUpperCase();
  });
  
  codeInput.addEventListener('invalid', function(e) {
    if (this.validity.patternMismatch) {
      this.setCustomValidity('Module code can only contain letters and numbers');
    } else {
      this.setCustomValidity('');
    }
  });
}
</script>
{% endblock %}
