{% extends "base.html" %}

{% block title %}Add Module - Admin{% endblock %}

{% block content %}
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow-sm">
        <div class="card-header bg-white">
          <h5 class="mb-0">Add New Module</h5>
        </div>
        <div class="card-body">
          <form method="post">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <div class="mb-3">
              <label class="form-label">Module Code</label>
              <input type="text" name="code" class="form-control" required 
                     placeholder="e.g., CS101" pattern="[A-Za-z0-9]+" 
                     title="Module code should only contain letters and numbers">
              <div class="form-text">Enter a unique module code (letters and numbers only)</div>
            </div>
            
            <div class="mb-3">
              <label class="form-label">Module Name</label>
              <input type="text" name="name" class="form-control" required 
                     placeholder="e.g., Introduction to Computer Science">
            </div>
            
            <div class="mb-4">
              <label class="form-label">Lecturer</label>
              <select name="lecturer_id" class="form-select" required>
                <option value="" disabled selected>Select a lecturer</option>
                {% for lecturer in lecturers %}
                <option value="{{ lecturer.id }}">
                  {{ lecturer.first_name }} {{ lecturer.last_name }} ({{ lecturer.email }})
                </option>
                {% endfor %}
              </select>
            </div>
            
            <div class="d-flex justify-content-end">
              <a href="{{ url_for('admin.list_modules') }}" class="btn btn-outline-secondary me-2">
                <i class="fas fa-arrow-left me-1"></i> Cancel
              </a>
              <button type="submit" class="btn btn-primary">
                <i class="fas fa-plus me-1"></i> Add Module
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
// Client-side validation for module code
const codeInput = document.querySelector('input[name="code"]');
if (codeInput) {
  codeInput.addEventListener('input', function(e) {
    this.value = this.value.toUpperCase();
  });
  
  codeInput.addEventListener('invalid', function(e) {
    if (this.validity.patternMismatch) {
      this.setCustomValidity('Module code can only contain letters and numbers');
    } else {
      this.setCustomValidity('');
    }
  });
}
</script>
{% endblock %}
